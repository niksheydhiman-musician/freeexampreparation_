backend:
  name: github
  repo: niksheydhiman-musician/freeexampreparation_
  branch: main

local_backend: true

site_url: https://freeexampreparation.com
display_url: https://freeexampreparation.com
logo_url: /favicon.ico

media_folder: "blogs/images"
public_folder: "/blogs/images"

collections:
  - name: "blogs"
    label: "Blogs"
    label_singular: "Blog"
    folder: "blogs"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blogs/{{slug}}"
    sortable_fields: ["date", "title", "category"]
    view_filters:
      - label: "Drafts"
        field: "draft"
        pattern: true
      - label: "Published"
        field: "draft"
        pattern: false
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Main blog headline" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: "Author", name: "author", widget: "string", default: "FreeExamPrep Team", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Preparation Strategy"
          - "Exam News"
          - "Notifications"
          - "Design & Architecture"
          - "General"
      - { label: "Summary", name: "summary", widget: "text", hint: "Short preview text for blog listing" }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Press enter to add each tag" }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true, hint: "Keep checked while drafting" }
      - { label: "Body", name: "body", widget: "markdown" }
