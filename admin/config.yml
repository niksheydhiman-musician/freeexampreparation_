# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: niksheydhiman-musician/freeexampreparation_

media_folder: /public/media
public_folder: /media

collections:
  - name: "blog"
    label: "Exam Strategy Blogs" # This changes the text on your sidebar!
    folder: "blogs/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Excerpt Description", name: "description", widget: "text" }
      - { label: "Body Content", name: "body", widget: "markdown" }
